name: Release

# Tag push (v*) -> build the Windows exe from labelImg.spec -> create the
# GitHub Release (auto-generated notes) with the exe + SHA256 attached.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        # ".[ai]" pulls in this project's own REQUIRED_DEP (pyqt5, lxml) *and*
        # EXTRA_DEP['ai'] (onnxruntime, numpy) straight from setup.py, so the
        # release build can never drift from what libs/inference/yolo_onnx.py
        # actually needs -- see labelImg.spec for why PyInstaller also needs
        # collect_dynamic_libs()/collect_data_files() calls (not a blanket
        # collect_all(), which drags in torch and breaks the build) to bundle
        # onnxruntime correctly.
        run: pip install pyinstaller ".[ai]"
      - name: Build Qt resources
        run: pyrcc5 -o libs/resources.py resources.qrc
      - name: Build exe (labelImg.spec bundles data/)
        run: pyinstaller labelImg.spec
      - name: Verify artifact and write SHA256
        shell: pwsh
        run: |
          if (-not (Test-Path dist/labelImg.exe)) { exit 1 }
          (Get-FileHash dist/labelImg.exe -Algorithm SHA256).Hash |
            Out-File -Encoding ascii dist/labelImg.exe.sha256
          Get-Content dist/labelImg.exe.sha256
      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/labelImg.exe
            dist/labelImg.exe.sha256
          generate_release_notes: true
