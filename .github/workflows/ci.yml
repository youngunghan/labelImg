name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.9', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install Qt runtime libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libdbus-1-3 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0
      - name: Install dependencies
        run: pip install pyqt5 lxml
      - name: Build Qt resources
        run: pyrcc5 -o libs/resources.py resources.qrc
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover tests -v

  # The core matrix above installs pyqt5+lxml ONLY: that is the base install, and
  # it is what proves the suite (and the app) still runs with no numpy and no
  # onnxruntime. This job is the other half of that claim -- with the [ai] extra
  # installed, the tests that are skipped up there (the ONNX-dependent ones in
  # tests/test_yolo_onnx.py) actually execute. Neither job is redundant: one
  # guards the degradation path, the other guards the model path.
  test-ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libdbus-1-3 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0
      # The same package set `pip install labelImg[ai]` resolves to; kept literal
      # (rather than `pip install .[ai]`) so the tests still run against the repo
      # tree, exactly like the core matrix. Quoted: `>` is a shell redirect.
      - name: Install dependencies (base + [ai] extra)
        run: pip install pyqt5 lxml 'onnxruntime>=1.15' numpy
      - name: Build Qt resources
        run: pyrcc5 -o libs/resources.py resources.qrc
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover tests -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff==0.12.0
      # Critical errors only (syntax errors, undefined names). libs/ustr.py
      # carries a dead Python 2 branch (`unicode`) — documented legacy,
      # scheduled for removal in the roadmap.
      - name: Ruff (critical rules)
        run: >
          ruff check --select E9,F63,F7,F82
          --per-file-ignores "libs/ustr.py:F821"
          --exclude libs/resources.py .
